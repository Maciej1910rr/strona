        input:focus, textarea:focus, select:focus {outline:none;border-color:#667eea}
        textarea {resize:vertical;min-height:120px}
        footer {padding:40px 0;text-align:center;border-top:1px solid #222;color:#666}
        @media(max-width:768px){h1{font-size:2rem}h2{font-size:1.8rem}nav a{display:block;margin:10px 0}}
