<style>
:root {
  --primary: #10b981;
  --primary-dark: #059669;
  --accent: #34d399;
  --dark: #0f172a;
  --gray: #64748b;
  --light: #f0fdf4;
  --white: #ffffff;
  --gradient: linear-gradient(135deg, #10b981 0%, #34d399 50%, #6ee7b7 100%);
  --shadow: 0 20px 60px -15px rgba(16, 185, 129, 0.5);
  --shadow-lg: 0 35px 60px -15px rgba(16, 185, 129, 0.6);
  --radius: 24px;
  --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', sans-serif;
  color: var(--dark);
  background: #fafafa;
  line-height: 1.7;
  overflow-x: hidden;
}

h1, h2, h3, h4 {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  line-height: 1.1;
}

img {
  max-width: 100%;
  height: auto;
  display: block;
}

.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
}

section {
  padding: 120px 0;
  margin: 32px;
  border: 5px solid var(--primary);
  border-radius: var(--radius);
  background: var(--white);
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 6px;
  background: var(--gradient);
}

@media (max-width: 768px) {
  section {
    margin: 16px;
    padding: 80px 0;
  }
}

/* Header */
header {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
  background: rgba(255, 255, 0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 5px solid var(--primary);
  box-shadow: 0 4px 30px rgba(16, 185, 129, 0.1);
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 90px;
}

.logo {
  font-size: 32px;
  font-weight: 900;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-decoration: none;
}

.nav-links {
  display: flex;
  gap: 48px;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--dark);
  font-weight: 700;
  font-size: 16px;
  transition: var(--transition);
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 0;
  width: 0;
  height: 4px;
  background: var(--gradient);
  transition: var(--transition);
  border-radius: 2px;
}

.nav-links a:hover::after {
  width: 100%;
}

.nav-links a:hover {
  color: var(--primary);
}

/* Hero z wideo */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding-top: 90px;
  position: relative;
  overflow: hidden;
  border: 5px solid var(--primary);
  margin: 32px;
  border-radius: var(--radius);
}

.hero-video-wrapper {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: -2;
}

.hero-video {
  position: absolute;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  width: auto;
  height: auto;
  transform: translate(-50%, -50%);
  object-fit: cover;
}

.hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, rgba(240, 253, 244, 0.97) 0%, rgba(16, 185, 129, 0.15) 100%);
  z-index: -1;
}

.hero-content {
  max-width: 900px;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 28px;
  background: var(--white);
  border: 4px solid var(--primary);
  border-radius: 50px;
  font-size: 15px;
  font-weight: 800;
  color: var(--primary);
  margin-bottom: 36px;
  box-shadow: var(--shadow);
}

.online-dot {
  width: 10px;
  height: 10px;
  background: #fbbf24;
  border-radius: 50%;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.hero h1 {
  font-size: clamp(48px, 8vw, 84px);
  margin-bottom: 32px;
  color: var(--dark);
}

.hero h1 span {
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  font-size: clamp(20px, 3vw, 24px);
  color: var(--gray);
  margin-bottom: 48px;
  font-weight: 500;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 48px;
  border-radius: 50px;
  font-weight: 800;
  font-size: 18px;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.btn-primary {
  background: var(--gradient);
  color: var(--white);
  box-shadow: 0 10px 40px 0 rgba(16, 185, 129, 0.6);
}

.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,0.4), transparent);
  transition: left 0.6s;
}

.btn-primary:hover::before {
  left: 100%;
}

.btn-primary:hover {
  transform: translateY(-4px);
  box-shadow: 0 15px 50px 0 rgba(16, 185, 129, 0.8);
}

.btn-secondary {
  background: var(--white);
  color: var(--dark);
  border: 4px solid var(--primary);
}

.btn-secondary:hover {
  background: var(--primary);
  color: var(--white);
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 48px;
  margin-top: 100px;
  padding-top: 60px;
  border-top: 4px solid var(--primary);
}

.stat-item h3 {
  font-size: 56px;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}

.stat-item p {
  font-size: 16px;
  color: var(--gray);
  font-weight: 700;
}

/* Section Header */
.section-header {
  text-align: center;
  max-width: 900px;
  margin: 0 auto 100px;
}

.section-badge {
  display: inline-block;
  padding: 10px 24px;
  background: var(--light);
  color: var(--primary);
  border: 4px solid var(--primary);
  border-radius: 50px;
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 24px;
}

.section-header h2 {
  font-size: clamp(42px, 7vw, 64px);
  margin-bottom: 24px;
}

.section-header p {
  font-size: 20px;
  color: var(--gray);
}

/* O Mnie */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.about-img {
  border-radius: var(--radius);
  border: 5px solid var(--primary);
  box-shadow: var(--shadow-lg);
}

.about-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin: 30px 0;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  background: var(--light);
  border-radius: 12px;
}

.info-item i {
  width: 48px;
  height: 48px;
  background: var(--gradient);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  font-size: 20px;
  flex-shrink: 0;
}

.contact-buttons {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 32px;
}

.btn-whatsapp {
  background: #25D366;
  color: var(--white);
}

.btn-mail {
  background: var(--gradient);
  color: var(--white);
}

/* Features */
.features {
  background: var(--light);
}

.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 36px;
}

.feature-card {
  background: var(--white);
  padding: 56px 40px;
  border-radius: var(--radius);
  border: 5px solid var(--primary);
  box-shadow: var(--shadow);
  transition: var(--transition);
  position: relative;
}

.feature-card:hover {
  transform: translateY(-16px);
  box-shadow: var(--shadow-lg);
  border-color: var(--accent);
}

.feature-icon {
  width: 80px;
  height: 80px;
  background: var(--gradient);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 32px;
  font-size: 36px;
  box-shadow: 0 12px 24px rgba(16, 185, 129, 0.4);
}

.feature-card h3 {
  font-size: 26px;
  margin-bottom: 16px;
}
