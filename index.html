            background-color: #3858e9;

            border: none;

            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;

            transition: background-color 0.2s;

            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .domain-card-text p {
            font-size: 14px;
            color: #50575e;
        }
        
        .domain-card-arrow {
            width: 20px;
            height: 20px;
            color: #50575e;
        }

        @media (max-width: 600px) {
