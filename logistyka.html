<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dzięki - BackhaulPL</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body { font-family: 'Outfit', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="text-center max-w-2xl">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h1 class="text-4xl sm:text-5xl font-black mb-4">Zgłoszenie wysłane!</h1>
            <p class="text-xl text-slate-600 mb-8">
                Dostałem Twoje dane. <strong>Oddzwonię w ciągu 5 minut</strong> z pasującym ładunkiem.
            </p>
            <p class="text-lg text-slate-600 mb-8">
                Trzymaj telefon przy sobie 📱
            </p>
            <a href="/strona/" class="inline-block px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg transition-all">
                Wróć na stronę główną
            </a>
            <div class="mt-12 text-sm text-slate-500">
                <p>Nie dostałeś telefonu w 5 min? Pisz na WhatsApp: <strong>+48 XXX XXX XXX</strong></p>
            </div>
        </div>
    </div>
</body>
</html>
